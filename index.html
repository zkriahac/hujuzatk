        <section lang="en" dir="ltr">
          <h1>Hujuzatk — Hotel &amp; Property Management System for Saudi Arabia &amp; the GCC</h1>
          <p><strong>Hujuzatk</strong> is a cloud-based Hotel and Property Management System (PMS) built for independent hotels, serviced apartments, and vacation rentals in Saudi Arabia and the GCC. Consolidate bookings from Airbnb, Gathern, and Booking.com in one place, with a 5-year calendar, automated invoicing, and full Arabic RTL support.</p>
          <p><a href="https://hujuzatk.com/user?tab=register">Start your 14-day free trial</a> — no credit card required.</p>

          <h2>Key features</h2>
          <ul>
            <li><strong>5-Year Booking Calendar</strong> — plan and view reservations up to 5 years ahead, unusual in PMS tooling.</li>
            <li><strong>Automatic channel sync</strong> (Pro plan) — bidirectional iCal sync with Airbnb, Gathern, and Booking.com, scheduled daily, prevents double-bookings.</li>
            <li><strong>Automated PDF invoicing</strong> — generates branded invoices automatically on check-out.</li>
            <li><strong>Financial analytics</strong> — occupancy rate, revenue per available room (RevPAR), per-channel breakdown.</li>
            <li><strong>Native Arabic RTL</strong> — full right-to-left layout, Arabic date formats, SAR and GCC currencies. Not a translation overlay.</li>
            <li><strong>Installable PWA</strong> — installs to your phone's home screen from the browser in one tap. Works offline, push notifications. No App Store or Play Store required.</li>
            <li><strong>Guest management</strong> — guest profiles, booking history, contact details, ID document storage.</li>
            <li><strong>Multi-currency</strong> — SAR, AED, KWD, BHD, QAR, OMR, USD, EUR, TRY.</li>
          </ul>

          <h2>Frequently asked questions</h2>

          <h3>What is Hujuzatk?</h3>
          <p>Hujuzatk is a cloud-based hotel and property management system designed for hotels, apartments, and vacation rentals in Saudi Arabia and the GCC. It offers a 5-year booking calendar, automated invoicing, financial analytics, automatic channel sync with Airbnb, Gathern, and Booking.com, and full Arabic and English support.</p>

          <h3>How much does Hujuzatk cost?</h3>
          <p>Two plans: Basic at $35/year (~131 SAR) and Pro at $58/year (~217 SAR). Pro adds automatic Airbnb, Gathern, and Booking.com channel sync. Both plans include unlimited bookings, up to 50 rooms, full reporting, and the 5-year calendar. A 14-day free trial is included, no credit card required.</p>

          <h3>Does Hujuzatk support Arabic?</h3>
          <p>Yes — fully native Arabic RTL throughout the application, including Arabic date formats, SAR and GCC currencies, and right-to-left layout. Arabic is a first-class language, not a translation overlay.</p>

          <h3>Does Hujuzatk sync with Gathern?</h3>
          <p>Yes — automatic two-way iCal sync with Gathern is included in the Pro plan, alongside Airbnb and Booking.com sync. Sync runs daily.</p>

          <h3>Is there a mobile app?</h3>
          <p>Yes — Hujuzatk installs to your phone's home screen directly from the browser in one tap. It works offline and sends push notifications. No App Store or Play Store download is required.</p>
